name: MarkdownPreview
options:
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "16"

targets:
  MarkdownPreview:
    type: application
    platform: macOS
    sources:
      - path: MarkdownPreview
        excludes:
          - Resources
      - path: MarkdownPreview/Resources
        buildPhase: resources
      - path: MarkdownPreview/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arcticrex.MarkdownPreview
        INFOPLIST_FILE: MarkdownPreview/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: NO
        PRODUCT_NAME: MarkdownPreview
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
