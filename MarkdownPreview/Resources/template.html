<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link id="theme-link" rel="stylesheet" href="github-markdown.min.css" data-pagedjs-ignore>
    <link id="code-theme-link" rel="stylesheet" href="highlight-github.min.css" data-pagedjs-ignore>
    <style data-pagedjs-ignore>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 24px 32px; }
        #content img { display: block !important; margin-left: auto !important; margin-right: auto !important; width: auto !important; max-width: 100% !important; }
        #content {
            max-width: 900px;
            margin: 0 auto;
        }
        /* In document mode, let Paged.js control width */
        .pagedjs_page_content #content {
            max-width: none;
            margin: 0;
        }

        /* Table overrides — applied on top of every theme */
        #content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.25em 0;
            font-size: 0.95em;
        }
        #content th,
        #content td {
            border: 1px solid #d0d7de;
            padding: 8px 14px;
            text-align: left;
            vertical-align: top;
            line-height: 1.5;
        }
        #content th {
            font-weight: 600;
            background-color: #f6f8fa;
            white-space: nowrap;
        }
        #content tr:nth-child(even) td {
            background-color: #fafbfc;
        }
        #content tr:hover td {
            background-color: #f0f3f6;
        }

        @media (prefers-color-scheme: dark) {
            html:not([data-theme=light]) #content th,
            html:not([data-theme=light]) #content td {
                border-color: #30363d;
            }
            html:not([data-theme=light]) #content th {
                background-color: #21262d;
            }
            html:not([data-theme=light]) #content tr:nth-child(even) td {
                background-color: #161b22;
            }
            html:not([data-theme=light]) #content tr:hover td {
                background-color: #1c2128;
            }
        }

        /* Document mode: page edge styling */
        .pagedjs_page {
            box-shadow: 0 1px 6px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            background: white;
        }
        .pagedjs_pages {
            padding: 20px 0;
        }
        /* Style margin box text */
        .pagedjs_margin-content {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 9pt;
            color: #666;
        }
        /* Header bottom border */
        .pagedjs_margin-top-left,
        .pagedjs_margin-top-center,
        .pagedjs_margin-top-right {
            border-bottom: 0.5px solid #ddd;
            padding-bottom: 4px;
        }
        /* Footer top border */
        .pagedjs_margin-bottom-left,
        .pagedjs_margin-bottom-center,
        .pagedjs_margin-bottom-right {
            border-top: 0.5px solid #ddd;
            padding-top: 4px;
        }
        /* Logo in header margin box */
        .pagedjs_margin-content img {
            max-height: 20px;
            vertical-align: middle;
        }

        /* Hide body during pagination transitions — applied via class to avoid flash */
        body.paginating {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Mermaid diagram containers: center, constrain, keep together across page breaks */
        .mermaid-diagram {
            display: flex;
            justify-content: center;
            margin: 1.25em 0;
            break-inside: avoid;
        }
        .mermaid-diagram svg {
            max-width: 100%;
            height: auto;
        }
        .mermaid-error {
            border: 1px solid #d0606e;
            background: #fff5f5;
            color: #8a1a1a;
            padding: 10px 14px;
            border-radius: 4px;
            margin: 1.25em 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.85em;
            white-space: pre-wrap;
        }

        /* Editing: keep the per-block wrappers transparent to layout. */
        #content .seg { outline: none; }
        #content .seg[contenteditable="true"]:focus { outline: none; }

        /* Blocking conflict overlay */
        .conflict-panel {
            border: 1px solid #d9a441;
            background: #fffbf0;
            border-radius: 6px;
            margin: 0.75em 0;
            padding: 10px 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 13px;
        }
        .conflict-title { font-weight: 600; color: #8a5a00; margin-bottom: 8px; }
        .conflict-cols { display: flex; gap: 10px; }
        .conflict-col { flex: 1; min-width: 0; }
        .conflict-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #777; margin-bottom: 4px; }
        .conflict-panel pre {
            margin: 0; padding: 8px; background: #fff; border: 1px solid #e3e3e3; border-radius: 4px;
            white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
        }
        .conflict-disk { border-color: #bcd6bc !important; }
        .conflict-actions { margin-top: 8px; display: flex; gap: 8px; }
        .conflict-actions button {
            font-size: 12px; padding: 4px 12px; border-radius: 5px; border: 1px solid #c5c5c5;
            background: #f5f5f5; cursor: pointer;
        }
        .conflict-actions button[data-act="mine"] { background: #2f6fdb; border-color: #2f6fdb; color: #fff; }
    </style>
    <script src="marked.min.js"></script>
    <script src="highlight.min.js"></script>
    <script src="mermaid.min.js"></script>
    <script>window.PagedConfig = { auto: false };</script>
    <script src="paged.polyfill.js"></script>
    <script src="editor-core.js"></script>
    <script>
        marked.use({ gfm: true, breaks: false });

        // Pre-process markdown to convert ![alt](url =WIDTHx) to inline HTML
        function preprocessImages(md) {
            return md.replace(/!\[([^\]]*)\]\((\S+)\s+=(\d+%?)x(\d+%?)?\)/g, function(match, alt, src, w, h) {
                var attrs = 'src="' + src + '" alt="' + alt.replace(/"/g, '&quot;') + '" width="' + w + '"';
                if (h) attrs += ' height="' + h + '"';
                return '<div><img ' + attrs + '></div>\n';
            });
        }

        var _rawMarkdown = '';
        var _currentMode = 'reading';
        var _currentConfig = null;
        var _paginationGen = 0;
        var _debounceTimer = null;
        var _baseURL = '';
        var _mermaidCounter = 0;

        // --- In-place editing state ---
        var _segments = [];          // EditorCore.segment() output; raw join === file
        var _baseMarkdown = '';      // last version common to disk + view (for 3-way merge)
        var _saveTimer = null;       // debounce for autosave
        var _conflicts = [];         // open blocking conflicts (suspends autosave)
        var _undoStack = [];         // our own undo (native undo bypasses source mutations)
        var _redoStack = [];
        var _listenersBound = false;

        function mermaidTheme() {
            // Force default theme in document/PDF mode (matches force-light behavior);
            // otherwise follow OS appearance.
            if (_currentMode === 'document') return 'default';
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark' : 'default';
        }

        async function processMermaid(container) {
            var blocks = container.querySelectorAll('pre > code.language-mermaid');
            if (!blocks.length) return;
            mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: mermaidTheme() });
            for (var i = 0; i < blocks.length; i++) {
                var code = blocks[i];
                var pre = code.parentElement;
                var src = code.textContent;
                var id = 'mermaid-' + (++_mermaidCounter);
                var wrap = document.createElement('div');
                wrap.className = 'mermaid-diagram';
                var ok = false;
                try {
                    // parse() with suppressErrors returns false on syntax errors
                    // instead of throwing *and* injecting a debug SVG into the DOM.
                    ok = !!(await mermaid.parse(src, { suppressErrors: true }));
                } catch (_) { ok = false; }
                if (ok) {
                    try {
                        var result = await mermaid.render(id, src);
                        wrap.innerHTML = result.svg;
                        if (result.bindFunctions) result.bindFunctions(wrap);
                    } catch (e) {
                        ok = false;
                    }
                }
                if (!ok) {
                    wrap.className = 'mermaid-error';
                    wrap.textContent = 'Mermaid syntax error in block:\n\n' + src.trim();
                }
                pre.parentNode.replaceChild(wrap, pre);
            }
            // Mermaid can leave behind orphan containers from failed renders.
            document.querySelectorAll('body > div[id^="dmermaid-"], body > iframe[id^="mermaid-"]').forEach(function(el){ el.remove(); });
        }

        function setBaseURL(url) {
            _baseURL = url;
        }

        // Resolve relative image/link paths against the markdown file's directory
        function resolveRelativePaths(container) {
            if (!_baseURL) return;
            container.querySelectorAll('img').forEach(function(img) {
                var src = img.getAttribute('src');
                if (src && !src.match(/^(https?:|data:|file:\/)/)) {
                    img.src = _baseURL + src;
                }
            });
            container.querySelectorAll('a').forEach(function(a) {
                var href = a.getAttribute('href');
                if (href && !href.match(/^(https?:|data:|file:\/|#|mailto:)/)) {
                    a.href = _baseURL + href;
                }
            });
        }

        function renderMarkdown(md) {
            // A full (re)load from Swift establishes a new common base for merges.
            _rawMarkdown = md;
            _baseMarkdown = md;
            _conflicts = [];
            if (_currentMode === 'reading') {
                renderReading();
            } else {
                debouncePaginate();
            }
        }

        async function renderReading() {
            var content = document.getElementById('content');
            if (!content) {
                // Rebuild content div if Paged.js destroyed it
                content = document.createElement('div');
                content.id = 'content';
                document.body.appendChild(content);
            }
            var scrollTop = window.scrollY;
            // Segmented render: one editable <div data-seg> per top-level block,
            // so edits can be folded back into just that block's source. `space`
            // separators stay in _segments (for reassembly) but aren't rendered.
            _segments = EditorCore.segment(_rawMarkdown, marked);
            content.className = isGithubTheme() ? 'markdown-body' : '';
            content.innerHTML = '';
            var editing = (_currentMode === 'reading' && _conflicts.length === 0);
            _segments.forEach(function(seg, i) {
                if (seg.type === 'space') return;
                var div = document.createElement('div');
                div.className = 'seg';
                div.setAttribute('data-seg', String(i));
                div.setAttribute('contenteditable', (editing && seg.editable) ? 'true' : 'false');
                div.innerHTML = marked.parse(preprocessImages(seg.raw));
                content.appendChild(div);
            });
            resolveRelativePaths(content);
            content.querySelectorAll('pre code:not(.language-mermaid)').forEach(function(block) {
                hljs.highlightElement(block);
            });
            window.scrollTo(0, scrollTop);
            await processMermaid(content);
            bindEditingListeners(content);
            if (_conflicts.length) renderConflicts(content);
        }

        function debouncePaginate() {
            clearTimeout(_debounceTimer);
            _debounceTimer = setTimeout(function() {
                paginate();
            }, 300);
        }

        async function paginate() {
            var gen = ++_paginationGen;
            // Hide during transition (class may already be set by setViewMode)
            document.body.classList.add('paginating');
            // Force light mode for document/PDF view
            document.documentElement.style.colorScheme = 'light';
            document.documentElement.setAttribute('data-theme', 'light');
            document.body.style.background = '#f0f0f0';
            // Clean up previous Paged.js output
            removePagedDOM();
            // Ensure content div exists
            var el = document.getElementById('content');
            if (!el) {
                el = document.createElement('div');
                el.id = 'content';
                document.body.appendChild(el);
            }
            // Render markdown into content (hidden)
            el.innerHTML = marked.parse(preprocessImages(_rawMarkdown));
            el.className = isGithubTheme() ? 'markdown-body' : '';
            resolveRelativePaths(el);
            document.querySelectorAll('#content pre code:not(.language-mermaid)').forEach(function(block) {
                hljs.highlightElement(block);
            });
            await processMermaid(el);
            if (gen !== _paginationGen) return; // stale
            // Build @page CSS from config
            var pagedCSS = buildPagedCSS(_currentConfig);
            // Wrap content so theme CSS selectors still match inside Paged.js pages
            var wrapperClass = isGithubTheme() ? 'markdown-body' : '';
            var logoHTML = '';
            if (_currentConfig && _currentConfig.logoBase64) {
                logoHTML = '<div id="running-logo"><img src="' + _currentConfig.logoBase64 + '"></div>';
            }
            var wrappedHTML = logoHTML + '<div id="content" class="' + wrapperClass + '">' + el.innerHTML + '</div>';
            // Build stylesheet array for Paged.js
            var stylesheets = [];
            if (pagedCSS) {
                var obj = {};
                obj[window.location.href] = pagedCSS;
                stylesheets.push(obj);
            }
            // Run Paged.js
            try {
                var paged = new Paged.Previewer();
                var flow = await paged.preview(
                    wrappedHTML,
                    stylesheets,
                    document.body
                );
                if (gen !== _paginationGen) return; // stale
                // Remove the original content div (Paged.js creates its own)
                if (el.parentNode) el.parentNode.removeChild(el);
            } catch(e) {
                console.error('Paged.js error:', e);
            }
            // Reveal once pagination is complete
            document.body.classList.remove('paginating');
            // Notify Swift to fade in the native webview
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.paginationDone) {
                window.webkit.messageHandlers.paginationDone.postMessage('done');
            }
        }

        function buildPagedCSS(config) {
            if (!config) return '';

            var m = config.margins || { top: 25, right: 20, bottom: 25, left: 20 };
            var size = config.pageSize || 'A4';

            var css = '@page {\n';
            css += '  size: ' + size + ';\n';
            css += '  margin: ' + m.top + 'mm ' + m.right + 'mm ' + m.bottom + 'mm ' + m.left + 'mm;\n';

            // Logo in top-left via running element
            if (config.logoBase64) {
                css += '  @top-left { content: element(logo); }\n';
                css += '}\n';
                css += '#running-logo { position: running(logo); }\n';
                css += '#running-logo img { max-height: 20px; }\n';
                css += '@page {\n';
            } else if (config.header && config.header.left) {
                css += '  @top-left { content: ' + buildContentValue(config.header.left) + '; }\n';
            }

            // Header remaining positions
            if (config.header) {
                if (config.header.center) css += '  @top-center { content: ' + buildContentValue(config.header.center) + '; }\n';
                if (config.header.right)  css += '  @top-right { content: '  + buildContentValue(config.header.right) + '; }\n';
            }

            // Footer margin boxes
            if (config.companyLine) {
                // Company notepaper: company details centered, page numbers right
                css += '  @bottom-center { content: ' + buildContentValue(config.companyLine) + '; font-size: 7pt; color: #999; }\n';
                if (config.footer) {
                    if (config.footer.left)  css += '  @bottom-left { content: '  + buildContentValue(config.footer.left) + '; }\n';
                    var pageContent = config.footer.center || config.footer.right;
                    if (pageContent) css += '  @bottom-right { content: ' + buildContentValue(pageContent) + '; }\n';
                }
            } else if (config.footer) {
                if (config.footer.left)   css += '  @bottom-left { content: '   + buildContentValue(config.footer.left) + '; }\n';
                if (config.footer.center) css += '  @bottom-center { content: ' + buildContentValue(config.footer.center) + '; }\n';
                if (config.footer.right)  css += '  @bottom-right { content: '  + buildContentValue(config.footer.right) + '; }\n';
            }

            css += '}\n';

            // Page break rules
            css += 'h1, h2, h3 { break-after: avoid; }\n';
            css += 'pre, blockquote, figure, table { break-inside: avoid; }\n';
            css += 'img { break-inside: avoid; display: block; margin-left: auto; margin-right: auto; }\n';
            css += 'p { widows: 3; orphans: 3; }\n';

            return css;
        }

        function buildContentValue(str) {
            // Split on {{page}} and {{pages}} and build CSS content value
            // e.g. "Page {{page}} of {{pages}}" → "Page " counter(page) " of " counter(pages)
            var parts = str.split(/(\{\{page\}\}|\{\{pages\}\})/);
            var result = '';
            for (var i = 0; i < parts.length; i++) {
                var p = parts[i];
                if (p === '{{page}}') {
                    result += ' counter(page) ';
                } else if (p === '{{pages}}') {
                    result += ' counter(pages) ';
                } else if (p.length > 0) {
                    result += '"' + p.replace(/"/g, '\\"') + '"';
                }
            }
            return result.trim() || '""';
        }

        function removePagedDOM() {
            // Remove Paged.js generated containers
            var pages = document.querySelector('.pagedjs_pages');
            if (pages) pages.remove();
            // Remove paged styles
            var style = document.getElementById('paged-styles');
            if (style) style.remove();
            // Remove running logo
            var logo = document.getElementById('running-logo');
            if (logo) logo.remove();
        }

        function setViewMode(mode, config) {
            // Hide immediately before any DOM changes
            document.body.classList.add('paginating');
            _currentMode = mode;
            _currentConfig = config;
            if (mode === 'reading') {
                // Allow dark mode in reading view
                document.documentElement.style.colorScheme = '';
                document.documentElement.removeAttribute('data-theme');
                removePagedDOM();
                document.body.style.padding = '24px 32px';
                document.body.style.background = '';
                renderReading();
                document.body.classList.remove('paginating');
            } else {
                // Force light mode for document/PDF view
                document.documentElement.style.colorScheme = 'light';
                document.documentElement.setAttribute('data-theme', 'light');
                document.body.style.padding = '0';
                document.body.style.background = '#f0f0f0';
                paginate();
                // paginate() will remove the class when done
            }
        }

        function setTheme(cssFile, codeTheme) {
            document.getElementById('theme-link').href = cssFile;
            document.getElementById('code-theme-link').href = codeTheme;
            // Update class on content div if it exists
            var el = document.getElementById('content');
            if (el) {
                el.className = (cssFile.indexOf('github') !== -1) ? 'markdown-body' : '';
            }
            // Re-paginate if in document mode
            if (_currentMode === 'document' && _rawMarkdown) {
                debouncePaginate();
            }
        }

        function isGithubTheme() {
            var link = document.getElementById('theme-link');
            return link && link.href.indexOf('github') !== -1;
        }

        // ===================== In-place editing =====================

        function contentEl() { return document.getElementById('content'); }
        function currentMarkdown() { return _segments.map(function(s){ return s.raw; }).join(''); }
        function priorLen(i) { var n = 0; for (var k = 0; k < i; k++) n += _segments[k].raw.length; return n; }

        function segDivFor(node) {
            var content = contentEl();
            while (node && node !== content) {
                if (node.nodeType === 1 && node.getAttribute && node.getAttribute('data-seg') !== null) return node;
                node = node.parentNode;
            }
            return null;
        }
        function segIndexOf(div) { return parseInt(div.getAttribute('data-seg'), 10); }

        function relexSeg(seg) {
            var re = EditorCore.segment(seg.raw, marked);
            if (re.length === 1) { seg.token = re[0].token; seg.type = re[0].type; seg.editable = re[0].editable; }
        }

        function renderSeg(div, seg) {
            div.innerHTML = marked.parse(preprocessImages(seg.raw));
            resolveRelativePaths(div);
            div.querySelectorAll('pre code:not(.language-mermaid)').forEach(function(b){ hljs.highlightElement(b); });
        }

        // Fold pending text edits in `div` back into its source, without touching
        // the DOM. Returns false if the edit changed inline structure (then it's
        // not a clean leaf substitution and the caller restores the block).
        function flushSegment(div) {
            var i = segIndexOf(div), seg = _segments[i];
            if (!seg) return true;
            var res = EditorCore.readEditsFromDom(div, seg.token);
            if (!res.clean) return false;
            if (res.edits.size > 0) { seg.raw = EditorCore.applyLeafEdits(seg, res.edits); relexSeg(seg); }
            return true;
        }

        function setCaretSource(div, seg, srcOffset) {
            var pos = EditorCore.sourceOffsetToDom(div, srcOffset, seg.token);
            if (!pos.node) return;
            var sel = window.getSelection(), r = document.createRange();
            r.setStart(pos.node, pos.offset); r.collapse(true);
            sel.removeAllRanges(); sel.addRange(r);
        }
        function setSelectionSource(div, seg, a, b) {
            var pa = EditorCore.sourceOffsetToDom(div, a, seg.token);
            var pb = EditorCore.sourceOffsetToDom(div, b, seg.token);
            if (!pa.node || !pb.node) return;
            var sel = window.getSelection(), r = document.createRange();
            r.setStart(pa.node, pa.offset); r.setEnd(pb.node, pb.offset);
            sel.removeAllRanges(); sel.addRange(r);
        }

        function pushUndo() {
            _undoStack.push(currentMarkdown());
            if (_undoStack.length > 200) _undoStack.shift();
            _redoStack = [];
        }
        function undo() {
            if (!_undoStack.length) return;
            _redoStack.push(currentMarkdown());
            _rawMarkdown = _undoStack.pop();
            renderReading(); scheduleSave();
        }
        function redo() {
            if (!_redoStack.length) return;
            _undoStack.push(currentMarkdown());
            _rawMarkdown = _redoStack.pop();
            renderReading(); scheduleSave();
        }

        function atBlockStart(sel, div) {
            if (!sel.isCollapsed) return false;
            var seg = _segments[segIndexOf(div)];
            return EditorCore.domOffsetToSourceOffset(div, sel.anchorNode, sel.anchorOffset, seg.token) === 0;
        }

        function onBeforeInput(e) {
            if (_currentMode !== 'reading' || _conflicts.length) return;
            if (e.isComposing) return;
            var sel = window.getSelection();
            if (!sel.rangeCount) return;
            var div = segDivFor(sel.anchorNode);
            if (!div) { e.preventDefault(); return; }
            var t = e.inputType;
            if (t === 'insertText' || t === 'insertReplacementText' || t === 'insertCompositionText') { scheduleSave(); return; }
            if (t.indexOf('delete') === 0) {
                if (t === 'deleteContentBackward' && atBlockStart(sel, div) && segIndexOf(div) > 0) { e.preventDefault(); doMerge(div); return; }
                scheduleSave(); return;
            }
            if (t === 'formatBold') { e.preventDefault(); doEmphasis(div, 'strong'); return; }
            if (t === 'formatItalic') { e.preventDefault(); doEmphasis(div, 'em'); return; }
            if (t === 'insertParagraph' || t === 'insertLineBreak') { e.preventDefault(); doSplit(div); return; }
            if (t === 'historyUndo') { e.preventDefault(); undo(); return; }
            if (t === 'historyRedo') { e.preventDefault(); redo(); return; }
            e.preventDefault(); // out of vocabulary (lists, hr, colour, drop, paste handled below)
        }

        function onPaste(e) {
            if (_currentMode !== 'reading' || _conflicts.length) return;
            var sel = window.getSelection();
            if (!sel.rangeCount || !segDivFor(sel.anchorNode)) return;
            e.preventDefault();
            var text = (e.clipboardData || window.clipboardData).getData('text/plain') || '';
            document.execCommand('insertText', false, text.replace(/\r?\n+/g, ' '));
            scheduleSave();
        }

        function doEmphasis(div, kind) {
            if (!flushSegment(div)) { renderSeg(div, _segments[segIndexOf(div)]); return; }
            var sel = window.getSelection();
            if (!sel.rangeCount) return;
            var r = sel.getRangeAt(0);
            if (segDivFor(r.startContainer) !== segDivFor(r.endContainer)) return; // single-block only
            var seg = _segments[segIndexOf(div)];
            // Range start/end are already in document order; bias each so the
            // selection stays inside any emphasis run it sits within.
            var a = EditorCore.domOffsetToSourceOffset(div, r.startContainer, r.startOffset, seg.token, 'start');
            var b = EditorCore.domOffsetToSourceOffset(div, r.endContainer, r.endOffset, seg.token, 'end');
            var res = EditorCore.toggleEmphasis(seg.raw, a, b, kind, marked);
            if (!res) return;
            pushUndo();
            seg.raw = res.md; relexSeg(seg); renderSeg(div, seg);
            setSelectionSource(div, seg, res.selStart, res.selEnd);
            scheduleSave();
        }

        function doSplit(div) {
            if (!flushSegment(div)) { renderSeg(div, _segments[segIndexOf(div)]); return; }
            var i = segIndexOf(div), seg = _segments[i];
            var sel = window.getSelection();
            var local = EditorCore.domOffsetToSourceOffset(div, sel.anchorNode, sel.anchorOffset, seg.token);
            var res = EditorCore.splitBlock(seg.raw, local, marked);
            pushUndo();
            var globalCaret = priorLen(i) + res.caret;
            seg.raw = res.md;
            _rawMarkdown = currentMarkdown();
            renderReading();
            restoreGlobalCaret(globalCaret);
            scheduleSave();
        }

        function doMerge(div) {
            if (!flushSegment(div)) { renderSeg(div, _segments[segIndexOf(div)]); return; }
            var globalStart = priorLen(segIndexOf(div));
            var res = EditorCore.mergeBlock(currentMarkdown(), globalStart, marked);
            pushUndo();
            _rawMarkdown = res.md;
            renderReading();
            restoreGlobalCaret(res.caret);
            scheduleSave();
        }

        // Place the caret at a document-global source offset after a full re-render.
        function restoreGlobalCaret(globalOffset) {
            var acc = 0;
            for (var i = 0; i < _segments.length; i++) {
                var seg = _segments[i], end = acc + seg.raw.length;
                if (globalOffset <= end && seg.type !== 'space') {
                    var div = contentEl().querySelector('[data-seg="' + i + '"]');
                    if (div) setCaretSource(div, seg, globalOffset - acc);
                    return;
                }
                acc = end;
            }
        }

        function scheduleSave() {
            if (_conflicts.length) return;
            clearTimeout(_saveTimer);
            _saveTimer = setTimeout(saveNow, 500);
        }
        // Fold the focused block's pending text edits into its source.
        function flushActive() {
            var active = document.activeElement;
            var div = active ? (segDivFor(active) || (active.getAttribute && active.getAttribute('data-seg') !== null ? active : null)) : null;
            if (div) flushSegment(div);
        }

        function saveNow() {
            if (_conflicts.length) return;
            flushActive();
            var md = currentMarkdown();
            _rawMarkdown = md; _baseMarkdown = md;
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.documentEdited) {
                window.webkit.messageHandlers.documentEdited.postMessage(md);
            }
        }
        function onBlur() { setTimeout(function(){ if (!_conflicts.length) saveNow(); }, 0); }

        // WKWebView (macOS) does NOT emit beforeinput formatBold/formatItalic on
        // Cmd+B/Cmd+I — the key equivalent reaches no handler and the system
        // beeps. Intercept the keystroke directly and route to the same path.
        function onKeydown(e) {
            if (_currentMode !== 'reading' || _conflicts.length) return;
            if (!e.metaKey || e.ctrlKey || e.altKey) return;
            var k = (e.key || '').toLowerCase();
            if (k !== 'b' && k !== 'i') return;
            var sel = window.getSelection();
            if (!sel.rangeCount) return;
            var div = segDivFor(sel.anchorNode);
            if (!div) return;
            e.preventDefault();
            doEmphasis(div, k === 'b' ? 'strong' : 'em');
        }

        function bindEditingListeners(content) {
            if (_listenersBound) return;
            content.addEventListener('beforeinput', onBeforeInput);
            content.addEventListener('keydown', onKeydown);
            content.addEventListener('paste', onPaste);
            content.addEventListener('blur', onBlur, true);
            _listenersBound = true;
        }

        // Called from Swift when the file changed on disk under the editor.
        function applyDiskChange(diskMd) {
            // Fold any in-progress (unsaved) edit into the source first, or the
            // merge can't see it and would silently drop it / miss a conflict.
            flushActive();
            var res = EditorCore.reconcile(_baseMarkdown, currentMarkdown(), diskMd, marked);
            if (res.conflicts.length === 0) {
                _rawMarkdown = res.merged; _baseMarkdown = res.merged;
                renderReading();
                if (res.merged !== diskMd) scheduleSave(); // persist our merge
                return;
            }
            _conflicts = res.conflicts;
            _rawMarkdown = res.merged;
            renderReading(); // re-render read-only with conflict overlays
        }

        function renderConflicts(content) {
            content = content || contentEl();
            // Idempotent: overlapping async re-renders must not stack panels.
            content.querySelectorAll('.conflict-panel').forEach(function(p){ p.remove(); });
            _conflicts.forEach(function(c) {
                var anchor = (c.segIndex >= 0) ? content.querySelector('[data-seg="' + c.segIndex + '"]') : null;
                var panel = document.createElement('div');
                panel.className = 'conflict-panel';
                panel.innerHTML =
                    '<div class="conflict-title">⚠ This block changed on disk while you were editing — resolve to continue</div>' +
                    '<div class="conflict-cols"><div class="conflict-col"><div class="conflict-label">Yours</div><pre class="conflict-mine"></pre></div>' +
                    '<div class="conflict-col"><div class="conflict-label">On disk</div><pre class="conflict-disk"></pre></div></div>' +
                    '<div class="conflict-actions"><button data-act="mine">Keep mine</button><button data-act="disk">Take disk</button></div>';
                panel.querySelector('.conflict-mine').textContent = c.view;
                panel.querySelector('.conflict-disk').textContent = c.disk;
                panel.querySelector('[data-act="mine"]').addEventListener('click', function(){ resolveConflict(c, c.view); });
                panel.querySelector('[data-act="disk"]').addEventListener('click', function(){ resolveConflict(c, c.disk); });
                if (anchor && anchor.parentNode) anchor.parentNode.insertBefore(panel, anchor.nextSibling);
                else content.appendChild(panel);
            });
        }

        function resolveConflict(c, chosen) {
            if (c.segIndex >= 0 && _segments[c.segIndex]) {
                _segments[c.segIndex].raw = chosen; relexSeg(_segments[c.segIndex]);
            } else {
                _rawMarkdown = chosen; _segments = EditorCore.segment(chosen, marked);
            }
            _conflicts = _conflicts.filter(function(x){ return x !== c; });
            _rawMarkdown = currentMarkdown();
            if (_conflicts.length === 0) {
                _baseMarkdown = _rawMarkdown;
                renderReading();
                saveNow();
            } else {
                renderReading();
            }
        }
    </script>
</head>
<body>
    <div id="content" class="markdown-body"></div>
</body>
</html>
